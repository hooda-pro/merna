<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ميرنا ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Cairo', 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        /* خلفية متحركة ناعمة */
        .bg-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-hearts span {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 24px;
            animation: floatHeart 8s infinite;
        }
        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        /* توزيع القلوب */
        .bg-hearts span:nth-child(1) { left: 10%; animation-duration: 7s; }
        .bg-hearts span:nth-child(2) { left: 30%; animation-duration: 9s; animation-delay: 2s; }
        .bg-hearts span:nth-child(3) { left: 50%; animation-duration: 8s; animation-delay: 1s; }
        .bg-hearts span:nth-child(4) { left: 70%; animation-duration: 10s; animation-delay: 3s; }
        .bg-hearts span:nth-child(5) { left: 90%; animation-duration: 6s; animation-delay: 0.5s; }

        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.5) inset;
            padding: 32px 24px;
            position: relative;
            z-index: 10;
            animation: containerAppear 0.8s ease;
        }
        @keyframes containerAppear {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* شاشة القفل */
        .lock-screen {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .lock-screen .heart-icon {
            font-size: 5rem;
            margin-bottom: 16px;
            animation: heartWave 2s infinite;
            display: inline-block;
            filter: drop-shadow(0 10px 15px rgba(102, 126, 234, 0.4));
        }
        @keyframes heartWave {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(5deg); }
            50% { transform: scale(1) rotate(-5deg); }
            75% { transform: scale(1.05) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .lock-screen h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 2px 2px 10px rgba(102, 126, 234, 0.2);
        }
        .lock-screen p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 32px;
        }
        .password-field {
            width: 100%;
            padding: 18px 22px;
            background: #f8f9ff;
            border: 2px solid #e0e4ff;
            border-radius: 50px;
            font-size: 1.2rem;
            text-align: center;
            color: #333;
            font-family: 'Cairo', sans-serif;
            outline: none;
            margin-bottom: 18px;
            transition: all 0.3s;
        }
        .password-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }
        .unlock-btn {
            width: 100%;
            padding: 18px 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .unlock-btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 10px rgba(102, 126, 234, 0.3);
        }

        /* المحتوى الرئيسي */
        .main-screen {
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden {
            display: none !important;
        }

        /* رأس المحتوى */
        .main-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .main-header .big-heart {
            font-size: 4rem;
            animation: gentleBeat 2s infinite;
            display: inline-block;
            margin-bottom: 8px;
        }
        @keyframes gentleBeat {
            0% { transform: scale(1); }
            10% { transform: scale(1.15); }
            20% { transform: scale(1); }
            30% { transform: scale(1.08); }
            40% { transform: scale(1); }
        }
        .main-header h2 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }
        .main-header h2::after {
            content: '✨';
            position: absolute;
            left: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            animation: sparkle 1.5s infinite;
        }
        .main-header h2::before {
            content: '✨';
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            animation: sparkle 1.5s infinite 0.5s;
        }
        @keyframes sparkle {
            0% { opacity: 0.2; transform: translateY(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
            100% { opacity: 0.2; transform: translateY(-50%) scale(0.8); }
        }

        /* رسالة الحب (من عندي) */
        .love-message {
            background: linear-gradient(135deg, #f5f0ff 0%, #f0e6ff 100%);
            border-radius: 30px;
            padding: 28px 22px;
            margin: 24px 0;
            border: 2px solid white;
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.15);
            position: relative;
            overflow: hidden;
            animation: messageGlow 3s infinite;
        }
        .love-message::before {
            content: '❤️';
            position: absolute;
            left: 10px;
            bottom: 10px;
            font-size: 3rem;
            opacity: 0.1;
            animation: rotate 10s infinite linear;
        }
        .love-message::after {
            content: '❤️';
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 2rem;
            opacity: 0.1;
            animation: rotate 8s infinite linear reverse;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes messageGlow {
            0% { box-shadow: 0 15px 30px rgba(102, 126, 234, 0.15); }
            50% { box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3); }
            100% { box-shadow: 0 15px 30px rgba(102, 126, 234, 0.15); }
        }
        .love-message p {
            color: #333;
            font-size: 1.2rem;
            line-height: 1.8;
            text-align: center;
            font-weight: 500;
            position: relative;
            z-index: 2;
        }
        .love-message .signature {
            display: block;
            margin-top: 20px;
            color: #667eea;
            font-weight: 700;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* العداد الأنيق */
        .timer-section {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            padding: 24px 16px;
            margin: 24px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 0 0 2px rgba(102, 126, 234, 0.2) inset;
        }
        .timer-title {
            color: #666;
            font-size: 1rem;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .timer-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            direction: ltr;
        }
        .time-unit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 25px;
            padding: 16px 8px;
            min-width: 70px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            animation: unitPop 0.5s ease;
            transition: all 0.2s;
        }
        .time-unit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(102, 126, 234, 0.4);
        }
        @keyframes unitPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .time-unit .number {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        .time-unit .label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* زر الرجوع */
        .back-button {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px solid #667eea;
            border-radius: 50px;
            color: #667eea;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }
        .back-button:active {
            background: #667eea;
            color: white;
            transform: scale(0.97);
        }

        /* فوتر */
        .footer-note {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- خلفية قلوب متحركة -->
    <div class="bg-hearts">
        <span>❤️</span>
        <span>❤️</span>
        <span>❤️</span>
        <span>❤️</span>
        <span>❤️</span>
    </div>

    <div class="container">
        <!-- شاشة القفل -->
        <div id="lockScreen" class="lock-screen">
            <div class="heart-icon">❤️</div>
            <h1>ميرنا</h1>
            <p>اكتبي السر وادخلي</p>
            <input type="text" id="passwordInput" class="password-field" placeholder="كلمة المرور" autocomplete="off">
            <button class="unlock-btn" id="unlockBtn">ادخلي</button>
            <div class="footer-note" style="margin-top: 30px;">⭐ ليها بس</div>
        </div>

        <!-- المحتوى الرئيسي -->
        <div id="mainScreen" class="main-screen hidden">
            <div class="main-header">
                <div class="big-heart">❤️</div>
                <h2>ميرنا</h2>
            </div>

            <!-- رسالة الحب (من عندي) -->
            <div class="love-message" id="loveMessage">
                <!-- هتتحط من الجافاسكربت -->
            </div>

            <!-- عداد الوقت -->
            <div class="timer-section">
                <div class="timer-title">منذ أن بدأ الحب</div>
                <div class="timer-grid" id="timerGrid">
                    <!-- هيتحط من الجافاسكربت -->
                </div>
            </div>

            <!-- زر الرجوع -->
            <button class="back-button" id="backBtn">🔙 رجوع</button>
            <div class="footer-note">كل ثانية معاكي أجمل</div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------ الإعدادات ------------------
            const START_DATE = new Date('2026-03-05T00:00:00'); // غير التاريخ
            const PASSWORD = "ميرنا";

            // رسالة حب من عندي (بصياغة جميلة)
            const LOVE_MESSAGE = `حبيبتي ميرنا،
            
من أول يوم قابلتك فيه، حسيت إن الدنيا لونها بقى أحلى. مش مجرد بداية علاقة جديدة، دي بداية شيء كبير حقيقي. كل لحظة بفكر فيك، بتبسط بشكل مش طبيعي.
            
بحبك. ❤️

- الشخص اللي بيحبك`;


            // ------------------ العناصر ------------------
            const lockScreen = document.getElementById('lockScreen');
            const mainScreen = document.getElementById('mainScreen');
            const passwordInput = document.getElementById('passwordInput');
            const unlockBtn = document.getElementById('unlockBtn');
            const backBtn = document.getElementById('backBtn');
            const loveMessage = document.getElementById('loveMessage');
            const timerGrid = document.getElementById('timerGrid');

            // حط الرسالة
            loveMessage.innerHTML = `<p>${LOVE_MESSAGE.replace(/\n/g, '<br>')}</p>`;

            // ------------------ دالة حساب الوقت (دقيقة جداً) ------------------
            function getTimeDifference(start) {
                const now = new Date();
                let diff = now - start;
                if (diff < 0) return { years: 0, days: 0, hours: 0, minutes: 0, seconds: 0 };

                // حساب السنوات بدقة
                let years = 0;
                let tempDate = new Date(start);
                while (true) {
                    let nextYear = new Date(tempDate);
                    nextYear.setFullYear(tempDate.getFullYear() + 1);
                    if (nextYear <= now) {
                        years++;
                        tempDate = nextYear;
                    } else break;
                }

                // حساب الأيام
                let days = 0;
                while (true) {
                    let nextDay = new Date(tempDate);
                    nextDay.setDate(tempDate.getDate() + 1);
                    if (nextDay <= now) {
                        days++;
                        tempDate = nextDay;
                    } else break;
                }

                // حساب الساعات والدقائق والثواني
                let remainingMs = now - tempDate;
                let totalSeconds = Math.floor(remainingMs / 1000);
                let hours = Math.floor(totalSeconds / 3600);
                let minutes = Math.floor((totalSeconds % 3600) / 60);
                let seconds = totalSeconds % 60;

                return { years, days, hours, minutes, seconds };
            }

            // ------------------ تحديث العداد ------------------
            function updateTimer() {
                const t = getTimeDifference(START_DATE);
                const format = (n) => n.toString().padStart(2, '0');
                timerGrid.innerHTML = `
                    <div class="time-unit" style="animation-delay: 0s">
                        <div class="number">${t.years}</div>
                        <div class="label">سنة</div>
                    </div>
                    <div class="time-unit" style="animation-delay: 0.1s">
                        <div class="number">${format(t.days)}</div>
                        <div class="label">يوم</div>
                    </div>
                    <div class="time-unit" style="animation-delay: 0.2s">
                        <div class="number">${format(t.hours)}</div>
                        <div class="label">ساعة</div>
                    </div>
                    <div class="time-unit" style="animation-delay: 0.3s">
                        <div class="number">${format(t.minutes)}</div>
                        <div class="label">دقيقة</div>
                    </div>
                    <div class="time-unit" style="animation-delay: 0.4s">
                        <div class="number">${format(t.seconds)}</div>
                        <div class="label">ثانية</div>
                    </div>
                `;
            }

            // ------------------ فتح المحتوى ------------------
            function unlockContent() {
                if (passwordInput.value.trim() === PASSWORD) {
                    lockScreen.classList.add('hidden');
                    mainScreen.classList.remove('hidden');
                    updateTimer();
                    if (window.timerInterval) clearInterval(window.timerInterval);
                    window.timerInterval = setInterval(updateTimer, 1000);
                } else {
                    alert('كلمة المرور مش صحيحة ياقلبي 😊');
                }
            }

            // ------------------ الرجوع للقفل ------------------
            function goBack() {
                mainScreen.classList.add('hidden');
                lockScreen.classList.remove('hidden');
                passwordInput.value = '';
                if (window.timerInterval) {
                    clearInterval(window.timerInterval);
                    window.timerInterval = null;
                }
            }

            // ------------------ الأحداث ------------------
            unlockBtn.addEventListener('click', unlockContent);
            backBtn.addEventListener('click', goBack);
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') unlockContent();
            });

            // تنظيف
            window.addEventListener('beforeunload', () => {
                if (window.timerInterval) clearInterval(window.timerInterval);
            });
        })();
    </script>
</body>
</html>
